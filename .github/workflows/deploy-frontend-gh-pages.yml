name: Deploy Frontend To GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "web/frontend/**"
      - ".github/workflows/deploy-frontend-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Set this in GitHub Repository Settings -> Secrets and variables -> Actions -> Variables.
      # Example: https://your-backend.example.com
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la web/frontend
          test -f web/frontend/package-lock.json && echo "lockfile found" || echo "lockfile missing"

      - name: Validate backend URL variable
        run: |
          if [ -z "${VITE_API_BASE_URL}" ]; then
            echo "ERROR: VITE_API_BASE_URL is empty."
            echo "Set it at: Settings -> Secrets and variables -> Actions -> Variables"
            exit 1
          fi
          echo "VITE_API_BASE_URL detected"
          echo "host=$(echo "${VITE_API_BASE_URL}" | sed -E 's#(https?://[^/]+).*#\1#')"

      - name: Install dependencies
        working-directory: web/frontend
        run: |
          pwd
          ls -la
          test -f package.json && echo "package.json found" || echo "package.json missing"
          node -v
          npm -v
          if [ -f package-lock.json ]; then
            echo "Try npm ci first"
            npm ci || (echo "npm ci failed, fallback to npm install" && npm install)
          else
            npm install
          fi

      - name: Write production env
        working-directory: web/frontend
        run: |
          cat > .env.production << 'EOF'
          VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          EOF

      - name: Build
        working-directory: web/frontend
        run: npm run build

      - name: SPA fallback + disable Jekyll
        working-directory: web/frontend
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

